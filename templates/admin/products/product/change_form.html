{% extends "admin/change_form.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
/* ===== CASCADE NOTES ===== */
.cascade-note {
    background: #dbeafe;
    border: 1px solid #3b82f6;
    padding: 10px 14px;
    margin: 8px 0;
    border-radius: 8px;
    color: #1e40af;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.cascade-note.success { background: #dcfce7; border-color: #22c55e; color: #166534; }
.cascade-note.warning { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
.cascade-note.error { background: #fecaca; border-color: #ef4444; color: #991b1b; }

/* ===== SELECT2 STYLING ===== */
.select2-container { width: 100% !important; max-width: 600px !important; }
.select2-container--default .select2-selection--single,
.select2-container--default .select2-selection--multiple {
    border: 2px solid #e2e8f0 !important;
    border-radius: 8px !important;
    min-height: 44px !important;
    padding: 4px 8px !important;
}
.select2-container--default.select2-container--focus .select2-selection--single,
.select2-container--default.select2-container--focus .select2-selection--multiple {
    border-color: #6366f1 !important;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15) !important;
}
.select2-container--default .select2-selection--multiple .select2-selection__choice {
    background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
    border: none !important;
    border-radius: 16px !important;
    padding: 4px 12px !important;
    color: white !important;
    font-size: 12px !important;
}
.select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
    color: white !important;
    margin-right: 6px !important;
}
.select2-dropdown {
    border: 2px solid #e2e8f0 !important;
    border-radius: 8px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1) !important;
}
.select2-container--default .select2-results__option {
    padding: 8px 12px !important;
    position: relative !important;
    padding-left: 35px !important;
}
.select2-container--default .select2-results__option:before {
    content: '☐';
    position: absolute;
    left: 10px;
    font-size: 16px;
    color: #6b7280;
}
.select2-container--default .select2-results__option[aria-selected=true]:before {
    content: '☑';
    color: #6366f1;
    font-weight: bold;
}
.select2-container--default .select2-results__option[aria-selected=true] {
    background: #eef2ff !important;
    color: #4338ca !important;
    font-weight: 500 !important;
}
.select2-container--default .select2-results__option--highlighted {
    background: #dbeafe !important;
    color: #1e40af !important;
}

/* ===== RICH TEXT EDITOR ===== */
.rich-text-wrapper {
    max-width: 600px;
    margin-top: 5px;
}
.rich-text-wrapper .ql-toolbar {
    border: 2px solid #e2e8f0 !important;
    border-bottom: 1px solid #e2e8f0 !important;
    border-radius: 8px 8px 0 0 !important;
    background: #f8fafc !important;
}
.rich-text-wrapper .ql-container {
    border: 2px solid #e2e8f0 !important;
    border-top: none !important;
    border-radius: 0 0 8px 8px !important;
    font-size: 14px !important;
    min-height: 200px !important;
    background: white !important;
}
.rich-text-wrapper .ql-editor {
    min-height: 200px !important;
    line-height: 1.6 !important;
}
.rich-text-wrapper .ql-editor.ql-blank::before {
    color: #94a3b8 !important;
    font-style: normal !important;
}
.rich-text-wrapper:focus-within .ql-toolbar,
.rich-text-wrapper:focus-within .ql-container {
    border-color: #6366f1 !important;
}

/* ===== FORM BUILDER v2 ===== */

/* Tab bar */
.fb-tabs{display:flex;background:#f1f5f9;border-radius:10px 10px 0 0;overflow:hidden;border:1.5px solid #e2e8f0;border-bottom:none;margin-top:16px}
.fb-tab{flex:1;padding:11px 14px;text-align:center;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s;user-select:none;display:flex;align-items:center;justify-content:center;gap:7px;border-bottom:3px solid transparent}
.fb-tab:hover{background:#e2e8f0;color:#374151}
.fb-tab.active{background:#fff;color:#4f46e5;border-bottom-color:#4f46e5}
.fb-tab-badge{background:#ede9fe;color:#5b21b6;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.fb-tab.active .fb-tab-badge{background:#4f46e5;color:#fff}

/* Panels */
.fb-panel{display:none;background:#fff;border:1.5px solid #e2e8f0;border-radius:0 0 10px 10px;padding:18px}
.fb-panel.active{display:block}

/* Header bar */
.fb-header-bar{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.fb-hb-icon{font-size:26px;color:#fff}
.fb-hb-title{color:#fff;font-size:17px;font-weight:700;margin:0}
.fb-hb-sub{color:rgba(255,255,255,.75);font-size:12px;margin:2px 0 0}
.fb-hb-count{margin-left:auto;background:rgba(255,255,255,.18);border-radius:20px;padding:3px 14px;font-size:13px;font-weight:700;color:#fff}

/* Palette */
.fb-palette-wrap{background:#f8fafc;border:2px dashed #e2e8f0;border-radius:10px;padding:12px;margin-bottom:16px}
.fb-palette-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin-bottom:8px}
.fb-palette{display:flex;flex-wrap:wrap;gap:6px}
.fb-type-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:#475569;font-family:inherit;transition:all .18s}
.fb-type-btn i{font-size:12px;width:13px;text-align:center}
.fb-type-btn:hover{border-color:#6366f1;background:#eef2ff;color:#4f46e5;transform:translateY(-1px);box-shadow:0 3px 10px rgba(99,102,241,.18)}

/* Fields list */
.fb-list-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.fb-hint-text{font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;color:#94a3b8}
.fb-fields-drop{min-height:80px;border:2px dashed #e2e8f0;border-radius:10px;padding:8px;background:#fafafa;transition:all .2s}
.fb-fields-drop.drag-over{background:#eef2ff;border-color:#6366f1;border-style:solid}
.fb-empty-state{text-align:center;padding:30px 20px;color:#94a3b8}
.fb-empty-state i{font-size:32px;margin-bottom:8px;display:block;opacity:.35}
.fb-empty-state p{font-size:13px;margin:0}

/* Field card */
.fb-card{background:#fff;border:2px solid #e5e7eb;border-radius:10px;margin-bottom:8px;transition:border-color .15s,box-shadow .15s;overflow:hidden}
.fb-card.is-selected{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.fb-card.is-dragging{opacity:.35;border-style:dashed}
.fb-card.drag-target{border-color:#6366f1;background:#f5f3ff}

.fb-card-top{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;user-select:none;border-bottom:2px solid transparent}
.fb-card.is-selected .fb-card-top{border-bottom-color:#e5e7eb}
.fb-drag-handle{color:#d1d5db;cursor:grab;font-size:14px;padding:0 3px;flex-shrink:0}
.fb-drag-handle:active{cursor:grabbing;color:#6366f1}

.fb-card-icon{width:32px;height:32px;border-radius:7px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:13px;flex-shrink:0;transition:all .2s}
.fb-card.is-selected .fb-card-icon{background:#4f46e5;color:#fff}
.fb-card-info{flex:1;min-width:0}
.fb-card-label{font-weight:600;font-size:13px;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-card-meta{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}

/* Badges */
.fb-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700}
.fb-badge-type{background:#ede9fe;color:#6d28d9}
.fb-badge-req{background:#fef2f2;color:#dc2626}
.fb-badge-price{background:#dcfce7;color:#166534}
.fb-badge-nested{background:#e0f2fe;color:#0369a1}

/* Card actions */
.fb-card-actions{display:flex;gap:2px;flex-shrink:0}
.fb-act-btn{width:27px;height:27px;border:none;border-radius:6px;background:transparent;cursor:pointer;color:#9ca3af;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.fb-act-btn:hover{background:#f1f5f9;color:#374151}
.fb-act-btn.del:hover{background:#fef2f2;color:#dc2626}
.fb-act-btn.dup:hover{background:#dcfce7;color:#166534}
.fb-act-btn:disabled{opacity:.25;cursor:not-allowed}

/* Settings panel */
.fb-settings{padding:14px 12px;background:#fdfdfe}
.fb-settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fb-sg{display:flex;flex-direction:column;gap:4px}
.fb-sg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#374151}
.fb-sg input,.fb-sg select,.fb-sg textarea{padding:8px 10px!important;border:1.5px solid #d1d5db!important;border-radius:7px!important;font-size:12px!important;width:100%!important;max-width:none!important;box-sizing:border-box!important;font-family:inherit!important;transition:border-color .15s!important;background:#fff!important}
.fb-sg input:focus,.fb-sg select:focus{border-color:#6366f1!important;box-shadow:0 0 0 3px rgba(99,102,241,.1)!important;outline:none!important}
.fb-id-input{background:#f8fafc!important;color:#94a3b8!important;cursor:not-allowed!important;font-family:monospace!important;font-size:11px!important}

/* Toggles */
.fb-toggles{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.fb-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;background:#f9fafb}
.fb-toggle-row.green{background:#f0fdf4;border-color:#86efac}
.fb-toggle-lbl .ttl{font-size:12px;font-weight:600;color:#374151}
.fb-toggle-lbl .sub{font-size:11px;color:#6b7280;margin-top:1px}
.fb-switch{position:relative;display:inline-block;width:42px;height:22px;flex-shrink:0}
.fb-switch input{opacity:0;width:0;height:0}
.fb-slider{position:absolute;cursor:pointer;inset:0;background:#d1d5db;border-radius:22px;transition:.25s}
.fb-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.fb-switch input:checked + .fb-slider{background:#6366f1}
.fb-switch input:checked + .fb-slider:before{transform:translateX(20px)}

/* Options editor */
.fb-opts-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#374151;margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.fb-opts-note{font-size:11px;color:#94a3b8;font-weight:400;text-transform:none;letter-spacing:0}
.fb-opt-cols-hdr{display:grid;gap:5px;align-items:center;margin-bottom:4px;padding:0 2px}
.fb-opt-cols-hdr span{font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase}

.fb-opt-row{display:flex;align-items:center;gap:5px;padding:5px 6px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;margin-bottom:4px}
.fb-opt-row.nested-open{border-color:#818cf8;border-radius:8px 8px 0 0;margin-bottom:0;background:#eef2ff}
.fb-opt-input{padding:6px 8px!important;border:1.5px solid #d1d5db!important;border-radius:6px!important;font-size:12px!important;max-width:none!important;font-family:inherit!important;background:#fff!important;transition:border-color .15s!important;box-sizing:border-box!important}
.fb-opt-input:focus{border-color:#6366f1!important;outline:none!important}
.fb-opt-input.lbl{flex:1.5;min-width:0}
.fb-opt-input.slug{flex:1;min-width:0;font-family:monospace;color:#64748b;font-size:11px!important}
.fb-opt-input.price{width:68px;flex:none;text-align:right}

/* Nested toggle button */
.fb-nested-btn{display:flex;align-items:center;gap:4px;padding:4px 9px;border:1.5px solid #c7d2fe;border-radius:6px;background:#eef2ff;color:#4338ca;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;flex-shrink:0}
.fb-nested-btn:hover{background:#e0e7ff;border-color:#818cf8}
.fb-nested-btn.open{background:#4f46e5;color:#fff;border-color:#4f46e5}
.fb-nc{background:#c7d2fe;color:#4338ca;border-radius:8px;padding:0 5px;font-size:10px;min-width:14px;text-align:center;display:inline-block}
.fb-nested-btn.open .fb-nc{background:rgba(255,255,255,.3);color:#fff}

.fb-opt-del-btn{width:24px;height:24px;border:none;background:transparent;cursor:pointer;color:#f87171;font-size:12px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fb-opt-del-btn:hover{background:#fef2f2}
.fb-opt-del-btn:disabled{opacity:.2;cursor:not-allowed}

.fb-add-opt-btn{display:flex;align-items:center;gap:6px;padding:7px;border:2px dashed #c7d2fe;border-radius:7px;background:transparent;color:#6366f1;font-size:12px;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:all .15s;font-family:inherit;margin-top:6px}
.fb-add-opt-btn:hover{background:#eef2ff;border-color:#818cf8}

/* Nested panel */
.fb-nested-panel{background:#f5f3ff;border:1.5px solid #a5b4fc;border-top:none;border-radius:0 0 8px 8px;padding:10px;margin-bottom:4px}
.fb-nested-panel-hdr{display:flex;align-items:center;gap:7px;font-size:12px;color:#5b21b6;font-weight:700;margin-bottom:8px;padding-bottom:7px;border-bottom:1.5px solid #ddd6fe}
.fb-nested-palette{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.fb-nested-type-btn{padding:4px 9px;border:1.5px solid #ddd6fe;border-radius:6px;background:#fff;cursor:pointer;font-size:11px;color:#6b7280;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px}
.fb-nested-type-btn:hover{border-color:#7c3aed;color:#5b21b6;background:#faf5ff}

/* Nested field card */
.fb-nested-card{background:#fff;border:1.5px solid #ddd6fe;border-radius:8px;margin-bottom:5px;overflow:hidden}
.fb-nested-card-top{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;background:#faf5ff;user-select:none}
.fb-nested-card-top:hover{background:#f3e8ff}
.fb-nested-card-body{display:none;padding:10px 12px;border-top:1px solid #ede9fe;background:#fff}
.fb-nested-card-body.open{display:block}
.fb-nested-settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

/* Validation box */
.fb-val-box{margin-top:10px;padding:10px 12px;background:#fef3c7;border:1.5px solid #fbbf24;border-radius:8px}
.fb-val-box-title{font-size:11px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.fb-val-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Preview tab */
.fb-preview-wrap{max-width:580px;margin:0 auto}
.fb-preview-title{font-size:15px;font-weight:700;color:#1f2937;margin-bottom:4px}
.fb-preview-sub{font-size:13px;color:#6b7280;margin-bottom:18px}
.fb-preview-field{margin-bottom:15px}
.fb-preview-field>label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
.req-star{color:#dc2626;margin-left:2px}
.field-hint{font-size:11px;color:#6b7280;margin-top:4px}
.fb-preview-field input[type=text],.fb-preview-field input[type=email],.fb-preview-field input[type=number],.fb-preview-field input[type=date],.fb-preview-field input[type=tel],.fb-preview-field textarea,.fb-preview-field select{width:100%!important;padding:9px 12px!important;border:2px solid #e5e7eb!important;border-radius:8px!important;font-size:13px!important;max-width:none!important;font-family:inherit!important;background:#fff!important;box-sizing:border-box!important;transition:border-color .2s!important}
.fb-preview-field input:focus,.fb-preview-field select:focus,.fb-preview-field textarea:focus{border-color:#6366f1!important;outline:none!important}
.fb-preview-opts{display:flex;flex-direction:column;gap:5px}
.fb-preview-opt{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:8px;transition:all .15s;font-size:13px}
.fb-preview-opt:hover{border-color:#6366f1;background:#fafafe}
.fb-preview-opt input{flex-shrink:0;accent-color:#6366f1}
.opt-price-tag{margin-left:auto;background:#dcfce7;color:#166534;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700}
.fb-nested-preview{margin-top:8px;padding:12px;background:#f5f3ff;border:1.5px solid #c4b5fd;border-radius:8px;display:none}
.fb-nested-preview.show{display:block}
.fb-nested-preview-lbl{font-size:11px;font-weight:700;color:#5b21b6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* JSON tab */
.fb-json-wrap{position:relative}
.fb-json-copy{position:absolute;top:10px;right:10px;padding:5px 12px;border:1.5px solid #e5e7eb;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#374151;font-family:inherit;transition:all .15s}
.fb-json-copy:hover{border-color:#6366f1;color:#4f46e5;background:#eef2ff}
.fb-json-copy.copied{background:#dcfce7;border-color:#22c55e;color:#166534}
.fb-json-out{background:#1e2433;color:#e2e8f0;padding:14px;border-radius:10px;font-family:monospace;font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre;min-height:180px}

.fb-divider{height:1px;background:#e5e7eb;margin:10px 0}

/* ===== CHECKBOX GROUP STYLING ===== */
.custom-dropdown {
    position: relative;
    width: 100%;
    max-width: 400px;
    margin-bottom: 10px;
}
.custom-dropdown-btn {
    border: 1px solid #ccc;
    padding: 10px;
    cursor: pointer;
    background: #fff;
    border-radius: 4px;
}
.custom-dropdown-content {
    display: none;
    position: absolute;
    width: 100%;
    border: 1px solid #ccc;
    background: #fff;
    max-height: 250px;
    overflow-y: auto;
    z-index: 9999;
    border-radius: 4px;
    margin-top: 2px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.custom-dropdown-content div {
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.custom-dropdown-content div:hover {
    background-color: #f2f2f2;
}
.custom-dropdown-content .checkmark {
    color: #10b981;
    font-weight: bold;
    display: none;
}
.custom-dropdown-content .selected .checkmark {
    display: inline;
}
.custom-multi-select {
    display: none !important;
}
.field-available_states,
.field-available_cities {
    overflow: visible !important;
}
.field-available_states .form-row,
.field-available_cities .form-row {
    margin-bottom: 280px;
}
</style>
{% endblock %}

{% block after_related_objects %}
{{ block.super }}

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
(function($) {
    'use strict';
    
    console.log('🚀 Product Admin JS Loading...');
    
    // Field Types
    var FIELD_TYPES = [
        {type:'text',     icon:'fa-font',         label:'Text'},
        {type:'textarea', icon:'fa-align-left',   label:'Long Text'},
        {type:'email',    icon:'fa-envelope',     label:'Email'},
        {type:'phone',    icon:'fa-phone',        label:'Phone'},
        {type:'number',   icon:'fa-hashtag',      label:'Number'},
        {type:'date',     icon:'fa-calendar',     label:'Date'},
        {type:'dropdown', icon:'fa-chevron-down', label:'Dropdown', hasOpts:true},
        {type:'checkbox', icon:'fa-check-square', label:'Checkbox', hasOpts:true},
        {type:'radio',    icon:'fa-circle-dot',   label:'Radio',    hasOpts:true},
        {type:'file',     icon:'fa-file-upload',  label:'File'},
        {type:'image',    icon:'fa-image',        label:'Image'},
        {type:'aadhar',   icon:'fa-id-card',      label:'Aadhar'},
        {type:'pan',      icon:'fa-credit-card',  label:'PAN'},
        {type:'pincode',  icon:'fa-map-pin',      label:'Pincode'}
    ];
    
    var formFields = [];
    var selectedFieldId = null;
    
    $(document).ready(function() {
        console.log('✅ Document Ready!');
        
        setTimeout(function() {
            initRichTextEditor();
            initCategoryFilter();
            initStateFilter();
            initFormBuilder();
            console.log('✅ All components initialized!');
        }, 300);
    });
    
    // ==================== RICH TEXT EDITOR ====================
    function initRichTextEditor() {
        // Find description field - try multiple possible IDs
        var $desc = $('#id_description');
        if (!$desc.length) {
            $desc = $('#id_full_description');
        }
        if (!$desc.length) {
            $desc = $('textarea[name="description"]');
        }
        if (!$desc.length) {
            $desc = $('textarea[name="full_description"]');
        }
        
        if (!$desc.length) {
            console.log('⚠️ Description textarea not found');
            return;
        }
        
        if (typeof Quill === 'undefined') {
            console.log('⚠️ Quill not loaded');
            return;
        }
        
        console.log('✅ Rich Text Editor initializing for:', $desc.attr('id') || $desc.attr('name'));
        
        // Create wrapper and editor
        var editorId = 'quill-editor-' + Date.now();
        var $wrapper = $('<div class="rich-text-wrapper"><div id="' + editorId + '"></div></div>');
        
        // Hide original textarea and add editor
        $desc.hide().after($wrapper);
        
        // Initialize Quill
        var quill = new Quill('#' + editorId, {
            theme: 'snow',
            placeholder: 'Enter description here...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });
        
        // Set initial content
        var initialContent = $desc.val();
        if (initialContent) {
            quill.root.innerHTML = initialContent;
        }
        
        // Sync content back to textarea on change
        quill.on('text-change', function() {
            $desc.val(quill.root.innerHTML);
        });
        
        // Also sync before form submit
        $desc.closest('form').on('submit', function() {
            $desc.val(quill.root.innerHTML);
        });
        
        console.log('✅ Rich Text Editor ready!');
    }
    
    // ==================== CATEGORY → SUBCATEGORY ====================
    function initCategoryFilter() {
        var $cat = $('#id_category');
        var $subcat = $('#id_subcategory');
        
        if (!$cat.length || !$subcat.length) {
            console.log('⚠️ Category fields not found');
            return;
        }
        
        console.log('✅ Category filter init');
        var currentSub = $subcat.val();
        
        $cat.after('<div class="cascade-note" id="cat-note"><i class="fas fa-info-circle"></i> Select category</div>');
        
        $cat.on('change', function() {
            var catId = $(this).val();
            if (!catId) {
                $subcat.html('<option value="">---------</option>');
                $('#cat-note').removeClass('success warning error').html('<i class="fas fa-info-circle"></i> Select category');
                return;
            }
            
            $('#cat-note').addClass('warning').removeClass('success error').html('<i class="fas fa-spinner fa-spin"></i> Loading...');
            
            $.get('/admin/products/product/ajax/get-subcategories/', {category_id: catId})
                .done(function(data) {
                    $subcat.html('<option value="">---------</option>');
                    if (data.subcategories && data.subcategories.length) {
                        data.subcategories.forEach(function(s) {
                            var sel = s.id == currentSub ? ' selected' : '';
                            $subcat.append('<option value="'+s.id+'"'+sel+'>'+s.name+'</option>');
                        });
                        $('#cat-note').removeClass('warning error').addClass('success').html('<i class="fas fa-check-circle"></i> '+data.subcategories.length+' subcategories loaded');
                    } else {
                        $('#cat-note').removeClass('success error').addClass('warning').html('<i class="fas fa-exclamation-triangle"></i> No subcategories found');
                    }
                })
                .fail(function() {
                    $('#cat-note').removeClass('success warning').addClass('error').html('<i class="fas fa-times-circle"></i> Error loading!');
                });
        });
        
        if ($cat.val()) $cat.trigger('change');
    }
    
    // ==================== STATE → CITY ====================
    function initStateFilter() {
        var $states = $('#id_available_states');
        var $cities = $('#id_available_cities');
        
        if (!$states.length || !$cities.length) {
            console.log('⚠️ State/City fields not found');
            return;
        }
        
        console.log('✅ State filter init with custom dropdown');
        
        // Create custom dropdown for states
        createCustomDropdown($states, 'Select States', 'stateDropdown');
        
        // Create custom dropdown for cities
        createCustomDropdown($cities, 'Select Cities', 'cityDropdown');
        
        $('.field-available_states').append('<div class="cascade-note" id="state-note"><i class="fas fa-info-circle"></i> Select states to filter cities</div>');
        
        // Listen to state changes
        $states.on('change', function() {
            var stateIds = $(this).val();
            console.log('States changed:', stateIds);
            
            if (!stateIds || !stateIds.length) {
                $('#cityDropdown .custom-dropdown-content > div').show();
                $('#state-note').removeClass('success warning error').html('<i class="fas fa-info-circle"></i> Select states to filter cities');
                return;
            }
            
            $('#state-note').addClass('warning').removeClass('success error').html('<i class="fas fa-spinner fa-spin"></i> Loading cities...');
            
            $.get('/admin/products/product/ajax/get-cities/', {state_ids: stateIds.join(',')})
                .done(function(data) {
                    console.log('Cities data:', data);
                    if (data.cities && data.cities.length) {
                        var cityIds = data.cities.map(function(c) { return String(c.id); });
                        
                        // Filter city dropdown options
                        $('#cityDropdown .custom-dropdown-content > div').each(function() {
                            var cityId = String($(this).data('value'));
                            if (cityIds.indexOf(cityId) > -1) {
                                $(this).show();
                            } else {
                                $(this).hide();
                            }
                        });
                        
                        $('#state-note').removeClass('warning error').addClass('success').html('<i class="fas fa-check-circle"></i> ' + data.cities.length + ' cities available');
                    } else {
                        $('#cityDropdown .custom-dropdown-content > div').hide();
                        $('#state-note').removeClass('success error').addClass('warning').html('<i class="fas fa-exclamation-triangle"></i> No cities found');
                    }
                })
                .fail(function() {
                    $('#state-note').removeClass('success warning').addClass('error').html('<i class="fas fa-times-circle"></i> Error loading!');
                });
        });
    }
    
    function createCustomDropdown($select, placeholder, id) {
        var selectedValues = $select.val() || [];
        var $wrapper = $('<div class="custom-dropdown" id="' + id + '"></div>');
        var $btn = $('<div class="custom-dropdown-btn">' + placeholder + '</div>');
        var $content = $('<div class="custom-dropdown-content"></div>');
        
        // Add options
        $select.find('option').each(function() {
            var value = $(this).val();
            var text = $(this).text();
            if (value) {
                var isSelected = selectedValues.indexOf(value) > -1 ? ' selected' : '';
                var $option = $('<div class="' + isSelected + '" data-value="' + value + '">' + text + ' <span class="checkmark">✔</span></div>');
                $content.append($option);
            }
        });
        
        $wrapper.append($btn).append($content);
        $select.after($wrapper);
        
        // Toggle dropdown
        $btn.on('click', function(e) {
            e.stopPropagation();
            $('.custom-dropdown-content').not($content).hide();
            $content.toggle();
        });
        
        // Select option
        $content.on('click', '> div', function() {
            $(this).toggleClass('selected');
            
            // Update hidden select
            var selected = [];
            $content.find('.selected').each(function() {
                selected.push($(this).data('value'));
            });
            $select.val(selected).trigger('change');
            
            console.log('Dropdown changed for:', id, 'Selected:', selected);
        });
        
        // Close on outside click
        $(document).on('click', function() {
            $content.hide();
        });
    }
    
    // ==================== FORM BUILDER v2 ====================
    // State
    var openNested  = {};   // {fieldId+'_'+optIdx: bool}
    var dragSrcIdx  = null;

    function uid() { return 'f' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }
    function fmeta(type) { return FIELD_TYPES.find(function(f){ return f.type===type; }) || {icon:'fa-font',label:type,hasOpts:false}; }
    function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function getField(id) { return formFields.find(function(f){ return f.id===id; }); }
    function nKey(fid,oi) { return fid+'_'+oi; }

    function defaultOpt(n) { return {label:'Option '+n, value:'option_'+n, price:0, nested_fields:[]}; }

    function saveSchema() {
        var $sf = $('#id_form_schema');
        if ($sf.length) $sf.val(JSON.stringify(formFields));
        $('#fb-count-badge').text(formFields.length);
    }

    function initFormBuilder() {
        var $schema = $('#id_form_schema');
        if (!$schema.length) return;

        // Parse existing schema + migrate options
        try {
            var val = $.trim($schema.val());
            if (val && val !== '[]' && val !== 'null') {
                formFields = JSON.parse(val);
                if (!Array.isArray(formFields)) formFields = [];
            }
            formFields.forEach(function(f) {
                (f.options||[]).forEach(function(o) { if (!o.nested_fields) o.nested_fields = []; });
            });
        } catch(e) { formFields = []; }

        var $fieldset = $schema.closest('fieldset');
        if (!$fieldset.length) return;
        $schema.closest('.form-row').hide();

        // Inject tabbed UI
        var ui = [
            '<div id="fbOuter">',
            '<div class="fb-tabs">',
            '  <div class="fb-tab active" data-tab="builder"><i class="fas fa-magic"></i> Form Builder <span class="fb-tab-badge" id="fb-count-badge">'+formFields.length+'</span></div>',
            '  <div class="fb-tab" data-tab="preview"><i class="fas fa-eye"></i> Live Preview</div>',
            '  <div class="fb-tab" data-tab="json"><i class="fas fa-code"></i> JSON Schema</div>',
            '</div>',
            '<div class="fb-panel active" data-panel="builder">',
            '  <div class="fb-header-bar">',
            '    <div class="fb-hb-icon"><i class="fas fa-wpforms"></i></div>',
            '    <div><p class="fb-hb-title" style="margin:0">Visual Form Builder</p><p class="fb-hb-sub">Drag-drop reorder &bull; Nested sub-forms on options &bull; Separate Label / Value / Price</p></div>',
            '    <div class="fb-hb-count" id="fb-hb-count">'+formFields.length+' fields</div>',
            '  </div>',
            '  <div class="fb-palette-wrap">',
            '    <div class="fb-palette-label">Click to add field</div>',
            '    <div class="fb-palette" id="fbPalette"></div>',
            '  </div>',
            '  <div class="fb-list-label">Form Fields <span class="fb-hint-text">&nbsp;&nbsp;⠿ drag handle se reorder karo &bull; card click se settings kholein</span></div>',
            '  <div class="fb-fields-drop" id="fbDrop"></div>',
            '</div>',
            '<div class="fb-panel" data-panel="preview"><div id="fbPreviewWrap"></div></div>',
            '<div class="fb-panel" data-panel="json">',
            '  <div class="fb-json-wrap">',
            '    <button type="button" class="fb-json-copy" id="fbJsonCopy"><i class="fas fa-copy"></i> Copy</button>',
            '    <pre class="fb-json-out" id="fbJsonOut"></pre>',
            '  </div>',
            '</div>',
            '</div>',
        ].join('');

        $fieldset.find('.form-row').first().before(ui);

        // Palette
        FIELD_TYPES.forEach(function(ft) {
            var $b = $('<button type="button" class="fb-type-btn" data-type="'+ft.type+'"><i class="fas '+ft.icon+'"></i> '+ft.label+'</button>');
            $b.on('click', function(){ addField(ft.type); });
            $('#fbPalette').append($b);
        });

        renderAll();

        // Tab switching
        $(document).on('click', '.fb-tab', function(){
            var tab = $(this).data('tab');
            $('.fb-tab').removeClass('active'); $(this).addClass('active');
            $('.fb-panel').removeClass('active'); $('[data-panel="'+tab+'"]').addClass('active');
            if (tab === 'preview') renderPreview();
            if (tab === 'json')    renderJson();
        });

        // JSON copy
        $('#fbJsonCopy').on('click', function(){
            var t = $('#fbJsonOut').text();
            navigator.clipboard.writeText(t).then(function(){
                $('#fbJsonCopy').addClass('copied').html('<i class="fas fa-check"></i> Copied!');
                setTimeout(function(){ $('#fbJsonCopy').removeClass('copied').html('<i class="fas fa-copy"></i> Copy'); }, 2000);
            });
        });

        // Drop zone
        $('#fbDrop').on('dragover', function(e){ e.preventDefault(); $(this).addClass('drag-over'); })
                   .on('dragleave', function(){ $(this).removeClass('drag-over'); })
                   .on('drop', function(e){ e.preventDefault(); $(this).removeClass('drag-over'); });
    }

    // ---- Render all field cards ----
    function renderAll() {
        var $drop = $('#fbDrop');
        if (!formFields.length) {
            $drop.html('<div class="fb-empty-state"><i class="fas fa-inbox"></i><p>No fields yet — click a type button above to start building</p></div>');
            saveSchema(); return;
        }
        $drop.empty();
        formFields.forEach(function(f, i){ $drop.append(buildCard(f, i)); });
        saveSchema();
        $('#fb-hb-count').text(formFields.length + ' field' + (formFields.length !== 1 ? 's' : ''));
    }

    // ---- Build one field card ----
    function buildCard(f, idx) {
        var m = fmeta(f.field_type);
        var isSel = (selectedFieldId === f.id);

        var badges = '<span class="fb-badge fb-badge-type">'+f.field_type+'</span>';
        if (f.required)  badges += ' <span class="fb-badge fb-badge-req">Required</span>';
        if (f.has_price) badges += ' <span class="fb-badge fb-badge-price"><i class="fas fa-rupee-sign" style="font-size:8px"></i> Priced</span>';
        var nc = 0; (f.options||[]).forEach(function(o){ nc += (o.nested_fields||[]).length; });
        if (nc) badges += ' <span class="fb-badge fb-badge-nested"><i class="fas fa-sitemap" style="font-size:8px"></i> '+nc+' nested</span>';

        var $card = $('<div class="fb-card'+(isSel?' is-selected':'')+'" data-id="'+f.id+'" draggable="true"></div>');

        var topHtml = [
            '<div class="fb-card-top">',
            '  <span class="fb-drag-handle"><i class="fas fa-grip-vertical"></i></span>',
            '  <div class="fb-card-icon"><i class="fas '+m.icon+'"></i></div>',
            '  <div class="fb-card-info">',
            '    <div class="fb-card-label" id="lbl-'+f.id+'">'+(f.label||'<em style="color:#94a3b8">Unlabeled</em>')+'</div>',
            '    <div class="fb-card-meta">'+badges+'</div>',
            '  </div>',
            '  <div class="fb-card-actions">',
            '    <button type="button" class="fb-act-btn dup" title="Duplicate"><i class="fas fa-copy"></i></button>',
            '    <button type="button" class="fb-act-btn mv-up"'+(idx===0?' disabled':'')+' title="Up"><i class="fas fa-chevron-up"></i></button>',
            '    <button type="button" class="fb-act-btn mv-dn"'+(idx===formFields.length-1?' disabled':'')+' title="Down"><i class="fas fa-chevron-down"></i></button>',
            '    <button type="button" class="fb-act-btn del" title="Delete"><i class="fas fa-trash"></i></button>',
            '  </div>',
            '</div>',
        ].join('');
        var $top = $(topHtml);
        $card.append($top);
        if (isSel) $card.append(buildSettings(f));

        // Drag
        $card.on('dragstart', function(e){
            dragSrcIdx = idx;
            setTimeout(function(){ $card.addClass('is-dragging'); }, 0);
            e.originalEvent.dataTransfer.effectAllowed = 'move';
        });
        $card.on('dragend', function(){
            $card.removeClass('is-dragging');
            $('.fb-card').removeClass('drag-target');
            dragSrcIdx = null;
        });
        $card.on('dragover', function(e){
            e.preventDefault();
            if (dragSrcIdx !== null && dragSrcIdx !== idx) { $('.fb-card').removeClass('drag-target'); $card.addClass('drag-target'); }
        });
        $card.on('drop', function(e){
            e.preventDefault(); e.stopPropagation();
            if (dragSrcIdx === null || dragSrcIdx === idx) return;
            var moved = formFields.splice(dragSrcIdx, 1)[0];
            formFields.splice(idx, 0, moved);
            dragSrcIdx = null; renderAll();
        });

        // Click header
        $top.on('click', function(e){
            if ($(e.target).closest('.fb-card-actions, .fb-drag-handle').length) return;
            selectedFieldId = (selectedFieldId === f.id) ? null : f.id;
            renderAll();
        });

        // Buttons
        $top.find('.dup').on('click', function(e){
            e.stopPropagation();
            var clone = JSON.parse(JSON.stringify(f));
            clone.id = uid(); clone.label += ' (copy)';
            clone.name = clone.label.toLowerCase().replace(/[^a-z0-9]+/g,'_');
            (clone.options||[]).forEach(function(o){ (o.nested_fields||[]).forEach(function(nf){ nf.id = uid(); }); });
            formFields.splice(idx+1, 0, clone);
            selectedFieldId = clone.id; renderAll();
        });
        $top.find('.mv-up').on('click', function(e){
            e.stopPropagation(); if (idx===0) return;
            var t = formFields[idx]; formFields[idx] = formFields[idx-1]; formFields[idx-1] = t; renderAll();
        });
        $top.find('.mv-dn').on('click', function(e){
            e.stopPropagation(); if (idx===formFields.length-1) return;
            var t = formFields[idx]; formFields[idx] = formFields[idx+1]; formFields[idx+1] = t; renderAll();
        });
        $top.find('.del').on('click', function(e){
            e.stopPropagation();
            if (!confirm('Delete "'+escH(f.label||f.field_type)+'"?')) return;
            formFields.splice(idx, 1);
            if (selectedFieldId === f.id) selectedFieldId = null;
            renderAll();
        });

        return $card;
    }

    // ---- Settings panel ----
    function buildSettings(f) {
        var m = fmeta(f.field_type);
        var isFile = f.field_type==='file' || f.field_type==='image';
        var $p = $('<div class="fb-settings"></div>');

        // Basic grid
        var $g = $('<div class="fb-settings-grid"></div>');
        $g.append(makeSG('Label *','fb-f-lbl-'+f.id, f.label, 'e.g. Full Name'));
        $g.append(makeSG('Placeholder','fb-f-ph-'+f.id, f.placeholder||'', 'Hint inside field'));
        $g.append(makeSG('Help Text','fb-f-ht-'+f.id, f.help_text||'', 'Text shown below field'));
        var $ig = $('<div class="fb-sg"></div>');
        $ig.append('<label>Field ID</label>');
        $ig.append('<input class="fb-id-input" readonly value="'+escH(f.name)+'">');
        $g.append($ig);
        $p.append($g);

        // Toggles
        var $tg = $('<div class="fb-toggles"></div>');
        $tg.append(makeToggle('Required','Make this field mandatory','fb-f-req-'+f.id, f.required));
        if (m.hasOpts) $tg.append(makeToggle('<i class="fas fa-rupee-sign" style="font-size:11px"></i> Enable Pricing','Each option can have a ₹ price','fb-f-price-'+f.id, f.has_price||false, true));
        $p.append($tg);

        // File validation
        if (isFile) {
            var $vb = $('<div class="fb-val-box"></div>');
            $vb.append('<div class="fb-val-box-title"><i class="fas fa-upload"></i> Upload Settings</div>');
            var $vg = $('<div class="fb-val-grid"></div>');
            $vg.append(makeSG('Max Files','fb-v-mf-'+f.id, (f.validation&&f.validation.max_files)||1,'1','number'));
            $vg.append(makeSG('Max Size (MB)','fb-v-ms-'+f.id, (f.validation&&f.validation.max_file_size_mb)||5,'5','number'));
            $vb.append($vg); $p.append($vb);
        }

        // Options editor
        if (m.hasOpts) {
            $p.append('<div class="fb-divider"></div>');
            $p.append(buildOptsEditor(f));
        }

        // Bind
        $p.find('.fb-f-lbl-'+f.id).on('input', function(){
            f.label = $(this).val();
            f.name = f.label.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'field';
            $('#lbl-'+f.id).text(f.label||'(unlabeled)');
            saveSchema();
        });
        $p.find('.fb-f-ph-'+f.id).on('input', function(){ f.placeholder=$(this).val(); saveSchema(); });
        $p.find('.fb-f-ht-'+f.id).on('input', function(){ f.help_text=$(this).val(); saveSchema(); });
        $p.find('.fb-f-req-'+f.id).on('change', function(){ f.required=$(this).is(':checked'); saveSchema(); renderAll(); });
        $p.find('.fb-f-price-'+f.id).on('change', function(){ f.has_price=$(this).is(':checked'); saveSchema(); renderAll(); });
        if (isFile) {
            $p.find('.fb-v-mf-'+f.id).on('change', function(){ f.validation.max_files=parseInt($(this).val())||1; saveSchema(); });
            $p.find('.fb-v-ms-'+f.id).on('change', function(){ f.validation.max_file_size_mb=parseInt($(this).val())||5; saveSchema(); });
        }
        return $p;
    }

    // ---- Options editor ----
    function buildOptsEditor(f) {
        var $sec = $('<div></div>');
        var $hdr = $('<div class="fb-opts-title"><i class="fas fa-list-ul"></i> Options <span class="fb-opts-note">— Nested button se option pe sub-fields lagao</span></div>');
        $sec.append($hdr);

        // Column header
        var $ch = $('<div class="fb-opt-cols-hdr" style="display:grid;gap:5px;align-items:center;grid-template-columns:1fr 1fr '+(f.has_price?'70px ':' ')+'100px 26px;margin-bottom:4px;padding:0 2px;"></div>');
        $ch.append('<span>Label</span>').append('<span>Value / Slug</span>');
        if (f.has_price) $ch.append('<span>Price ₹</span>');
        $ch.append('<span>Nested</span>').append('<span></span>');
        $sec.append($ch);

        var $list = $('<div id="optlist-'+f.id+'"></div>');

        function redraw() {
            $list.empty();
            (f.options||[]).forEach(function(o, i){ $list.append(buildOptRow(f, o, i, redraw)); });
        }
        redraw();
        $sec.append($list);

        var $add = $('<button type="button" class="fb-add-opt-btn"><i class="fas fa-plus"></i> Add Option</button>');
        $add.on('click', function(){
            f.options.push(defaultOpt(f.options.length+1));
            saveSchema(); redraw();
        });
        $sec.append($add);
        return $sec;
    }

    // ---- Single option row ----
    function buildOptRow(f, opt, oi, redraw) {
        var k = nKey(f.id, oi);
        var isOpen = !!openNested[k];
        var nc = (opt.nested_fields||[]).length;

        var $wrap = $('<div></div>');
        var gridCols = '1fr 1fr '+(f.has_price?'70px ':' ')+'100px 26px';
        var $row = $('<div class="fb-opt-row'+(isOpen?' nested-open':'')+'" style="display:grid;gap:5px;align-items:center;grid-template-columns:'+gridCols+'"></div>');

        var $lbl  = $('<input class="fb-opt-input lbl" placeholder="Label" value="'+escH(opt.label)+'">');
        var $slug = $('<input class="fb-opt-input slug" placeholder="slug" value="'+escH(opt.value)+'">');
        var $price = f.has_price ? $('<input type="number" class="fb-opt-input price" placeholder="0" value="'+(opt.price||0)+'" min="0">') : null;

        // Nested button
        var $nb = $('<button type="button" class="fb-nested-btn'+(isOpen?' open':'')+'"></button>');
        $nb.html(isOpen ? '<i class="fas fa-chevron-up"></i> Nested'+(nc?' <span class="fb-nc">'+nc+'</span>':'') : '<i class="fas fa-sitemap"></i> Nested'+(nc?' <span class="fb-nc">'+nc+'</span>':''));

        var $del = $('<button type="button" class="fb-opt-del-btn" title="Remove"><i class="fas fa-times"></i></button>');
        if ((f.options||[]).length <= 1) $del.prop('disabled', true);

        $row.append($lbl).append($slug);
        if ($price) $row.append($price);
        $row.append($nb).append($del);
        $wrap.append($row);

        // Nested panel
        if (isOpen) {
            if (!opt.nested_fields) opt.nested_fields = [];
            $wrap.append(buildNestedPanel(f, opt, oi, redraw));
        }

        // Bindings
        $lbl.on('input', function(){
            opt.label = $(this).val();
            var auto = opt.label.toLowerCase().replace(/[^a-z0-9]+/g,'_');
            $slug.val(auto); opt.value = auto;
            saveSchema();
        });
        $slug.on('input', function(){ opt.value = $(this).val(); saveSchema(); });
        if ($price) $price.on('input', function(){ opt.price = parseFloat($(this).val())||0; saveSchema(); });
        $nb.on('click', function(e){
            e.preventDefault();
            openNested[k] = !openNested[k];
            saveSchema(); redraw();
        });
        $del.on('click', function(){
            f.options.splice(oi, 1);
            delete openNested[k];
            saveSchema(); redraw(); renderAll();
        });

        return $wrap;
    }

    // ---- Nested panel ----
    function buildNestedPanel(pf, opt, oi, parentRedraw) {
        var $np = $('<div class="fb-nested-panel"></div>');
        $np.append('<div class="fb-nested-panel-hdr"><i class="fas fa-sitemap"></i> Sub-fields shown when <strong style="color:#4f46e5">"'+escH(opt.label||'this option')+'"</strong> is selected</div>');

        var $pal = $('<div class="fb-nested-palette"></div>');
        var NTYPES = ['text','textarea','email','phone','number','date','file','image','dropdown','checkbox','radio'];
        NTYPES.forEach(function(t){
            var nm = fmeta(t);
            var $b = $('<button type="button" class="fb-nested-type-btn"><i class="fas '+nm.icon+'"></i> '+nm.label+'</button>');
            $b.on('click', function(){
                var nf = {
                    id:uid(), field_type:t,
                    label:nm.label, name:nm.label.toLowerCase().replace(/[^a-z0-9]+/g,'_'),
                    placeholder:'', help_text:'', required:false, has_price:false,
                    validation:{}, options: nm.hasOpts ? [defaultOpt(1),defaultOpt(2)] : []
                };
                opt.nested_fields.push(nf);
                saveSchema();
                renderNFList($nfList, opt, pf, oi, parentRedraw);
                renderAll();
            });
            $pal.append($b);
        });
        $np.append($pal);

        var $nfList = $('<div class="fb-nested-fields"></div>');
        renderNFList($nfList, opt, pf, oi, parentRedraw);
        $np.append($nfList);
        return $np;
    }

    // ---- Render nested fields list ----
    function renderNFList($c, opt, pf, oi, pRedraw) {
        $c.empty();
        if (!opt.nested_fields || !opt.nested_fields.length) {
            $c.html('<div style="text-align:center;padding:12px;color:#94a3b8;font-size:12px;">Click a field type above to add nested sub-fields</div>');
            return;
        }
        opt.nested_fields.forEach(function(nf, ni){ $c.append(buildNestedCard(nf, ni, opt, pf, oi, pRedraw, $c)); });
    }

    // ---- Nested field card ----
    function buildNestedCard(nf, ni, opt, pf, oi, pRedraw, $c) {
        var nm = fmeta(nf.field_type);
        var $nc = $('<div class="fb-nested-card"></div>');
        var badges2 = '<span class="fb-badge fb-badge-type" style="font-size:9px">'+nf.field_type+'</span>';
        if (nf.required) badges2 += ' <span class="fb-badge fb-badge-req" style="font-size:9px">Req</span>';

        var $top = $([
            '<div class="fb-nested-card-top">',
            '  <i class="fas '+nm.icon+'" style="color:#7c3aed;font-size:12px;width:15px;text-align:center"></i>',
            '  <span style="flex:1;font-size:12px;font-weight:600;color:#1f2937">'+(nf.label||'<em style="color:#94a3b8">Unlabeled</em>')+'</span>',
            '  <div style="display:flex;gap:2px;align-items:center">'+badges2+'</div>',
            '  <div style="display:flex;gap:2px;margin-left:8px">',
            '    <button type="button" class="fb-act-btn n-up" style="width:22px;height:22px;font-size:10px"'+(ni===0?' disabled':'')+' title="Up"><i class="fas fa-chevron-up"></i></button>',
            '    <button type="button" class="fb-act-btn n-dn" style="width:22px;height:22px;font-size:10px"'+(ni===opt.nested_fields.length-1?' disabled':'')+' title="Down"><i class="fas fa-chevron-down"></i></button>',
            '    <button type="button" class="fb-act-btn del n-del" style="width:22px;height:22px;font-size:10px" title="Delete"><i class="fas fa-trash"></i></button>',
            '  </div>',
            '  <i class="fas fa-chevron-down" style="color:#a78bfa;font-size:10px;margin-left:6px"></i>',
            '</div>',
        ].join(''));

        var $body = $('<div class="fb-nested-card-body"></div>');
        $body.append(buildNestedSettings(nf, opt, pf, oi, pRedraw, $c));
        $nc.append($top).append($body);

        $top.on('click', function(e){
            if ($(e.target).closest('.n-up,.n-dn,.n-del').length) return;
            $body.toggleClass('open');
            $top.find('.fa-chevron-down,.fa-chevron-up').toggleClass('fa-chevron-down fa-chevron-up');
        });
        $top.find('.n-up').on('click', function(e){
            e.stopPropagation(); if (ni===0) return;
            var t=opt.nested_fields[ni]; opt.nested_fields[ni]=opt.nested_fields[ni-1]; opt.nested_fields[ni-1]=t;
            saveSchema(); renderNFList($c, opt, pf, oi, pRedraw);
        });
        $top.find('.n-dn').on('click', function(e){
            e.stopPropagation(); if (ni===opt.nested_fields.length-1) return;
            var t=opt.nested_fields[ni]; opt.nested_fields[ni]=opt.nested_fields[ni+1]; opt.nested_fields[ni+1]=t;
            saveSchema(); renderNFList($c, opt, pf, oi, pRedraw);
        });
        $top.find('.n-del').on('click', function(e){
            e.stopPropagation();
            opt.nested_fields.splice(ni, 1);
            saveSchema(); renderNFList($c, opt, pf, oi, pRedraw); renderAll();
        });
        return $nc;
    }

    // ---- Nested field settings ----
    function buildNestedSettings(nf, opt, pf, oi, pRedraw, $c) {
        var nm = fmeta(nf.field_type);
        var $w = $('<div></div>');
        var $g = $('<div class="fb-nested-settings-grid"></div>');
        $g.append(makeSG('Label','nfl-'+nf.id, nf.label,'Field label'));
        $g.append(makeSG('Placeholder','nfp-'+nf.id, nf.placeholder||'','Hint text'));
        $w.append($g);
        $w.append(makeToggle('Required','Mandatory','nfr-'+nf.id, nf.required));
        if (nm.hasOpts) {
            $w.append(makeToggle('<i class="fas fa-rupee-sign" style="font-size:10px"></i> Pricing','Option pricing','nfpr-'+nf.id, nf.has_price||false, true));
            $w.append(buildSimpleOpts(nf));
        }
        $w.find('.nfl-'+nf.id).on('input', function(){
            nf.label=$(this).val();
            nf.name=nf.label.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'field';
            // Update card title in-place to avoid re-render (which kills focus)
            $c.find('.fb-nested-card').each(function(){
                var $span=$(this).find('.fb-nested-card-top span').first();
                if($(this).find('.nfl-'+nf.id).length) $span.text(nf.label||'Unlabeled');
            });
            saveSchema();
        });
        $w.find('.nfp-'+nf.id).on('input', function(){ nf.placeholder=$(this).val(); saveSchema(); });
        $w.find('.nfr-'+nf.id).on('change', function(){ nf.required=$(this).is(':checked'); saveSchema(); renderNFList($c,opt,pf,oi,pRedraw); });
        $w.find('.nfpr-'+nf.id).on('change', function(){ nf.has_price=$(this).is(':checked'); saveSchema(); renderNFList($c,opt,pf,oi,pRedraw); });
        return $w;
    }

    // ---- Simple options for nested radio/checkbox/dropdown ----
    function buildSimpleOpts(nf) {
        var $sec = $('<div style="margin-top:8px"></div>');
        $sec.append('<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#374151;margin-bottom:5px">Options</div>');
        var $l = $('<div></div>');
        function ro() {
            $l.empty();
            (nf.options||[]).forEach(function(o,i){
                var $r = $('<div style="display:flex;gap:4px;align-items:center;margin-bottom:4px"></div>');
                var $lb=$('<input class="fb-opt-input lbl" style="flex:1;min-width:0" placeholder="Label" value="'+escH(o.label)+'">');
                var $vl=$('<input class="fb-opt-input slug" style="flex:.8;min-width:0" placeholder="slug" value="'+escH(o.value)+'">');
                var $pr=nf.has_price?$('<input type="number" class="fb-opt-input price" style="width:55px" placeholder="₹" value="'+(o.price||0)+'">'):null;
                var $d=$('<button type="button" class="fb-opt-del-btn"><i class="fas fa-times"></i></button>');
                if((nf.options||[]).length<=1) $d.prop('disabled',true);
                $lb.on('input',function(){ o.label=$(this).val(); o.value=o.label.toLowerCase().replace(/[^a-z0-9]+/g,'_'); $vl.val(o.value); saveSchema(); });
                $vl.on('input',function(){ o.value=$(this).val(); saveSchema(); });
                if($pr) $pr.on('input',function(){ o.price=parseFloat($(this).val())||0; saveSchema(); });
                $d.on('click',function(){ nf.options.splice(i,1); saveSchema(); ro(); });
                $r.append($lb).append($vl);
                if($pr) $r.append($pr);
                $r.append($d); $l.append($r);
            });
        }
        ro(); $sec.append($l);
        var $a=$('<button type="button" class="fb-add-opt-btn" style="font-size:11px;padding:5px;margin-top:3px"><i class="fas fa-plus"></i> Add</button>');
        $a.on('click',function(){
            if(!nf.options) nf.options=[];
            nf.options.push({label:'Option '+(nf.options.length+1),value:'option_'+(nf.options.length+1),price:0,nested_fields:[]});
            saveSchema(); ro();
        });
        $sec.append($a); return $sec;
    }

    // ---- Add field (top-level) ----
    function addField(type) {
        var m = fmeta(type);
        var f = {
            id:uid(), field_type:type,
            label:m.label, name:m.label.toLowerCase().replace(/[^a-z0-9]+/g,'_'),
            placeholder:'', help_text:'', required:false, has_price:false,
            order:formFields.length+1, validation:{},
            options: m.hasOpts ? [defaultOpt(1),defaultOpt(2)] : []
        };
        if (type==='file'||type==='image') f.validation={max_files:1,max_file_size_mb:5};
        formFields.push(f);
        selectedFieldId = f.id;
        renderAll();
        setTimeout(function(){
            var $c=$('.fb-card[data-id="'+f.id+'"]');
            if($c.length) $c[0].scrollIntoView({behavior:'smooth',block:'nearest'});
        }, 80);
    }

    // ---- Live Preview ----
    function renderPreview() {
        var $w = $('#fbPreviewWrap'); $w.empty();
        if (!formFields.length) {
            $w.html('<div style="text-align:center;padding:40px;color:#94a3b8;font-size:13px"><i class="fas fa-eye-slash" style="font-size:32px;display:block;margin-bottom:10px;opacity:.3"></i>Add fields in Builder tab to see preview</div>');
            return;
        }
        $w.append('<p class="fb-preview-title">Form Preview</p>');
        $w.append('<p class="fb-preview-sub">Exactly how this form will appear to users</p>');
        formFields.forEach(function(f){ $w.append(renderPvField(f)); });
    }

    function renderPvField(f) {
        var $w = $('<div class="fb-preview-field"></div>');
        var $lbl = $('<label></label>').text(f.label||f.field_type);
        if (f.required) $lbl.append('<span class="req-star">*</span>');
        $w.append($lbl);
        var t = f.field_type;
        if (['text','email','phone','number','date','aadhar','pan','pincode'].indexOf(t) > -1) {
            var it = t==='email'?'email':t==='number'?'number':t==='date'?'date':t==='phone'?'tel':'text';
            $w.append($('<input>').attr({type:it, placeholder:f.placeholder||''}));
        } else if (t==='textarea') {
            $w.append($('<textarea rows="3"></textarea>').attr('placeholder', f.placeholder||''));
        } else if (t==='file'||t==='image') {
            $w.append($('<input type="file"'+(t==='image'?' accept="image/*"':((f.validation&&f.validation.max_files>1)?' multiple':''))+'>'));
        } else if (t==='dropdown') {
            var $sel = $('<select></select>').append('<option value="">-- Select --</option>');
            var $nwrp = $('<div></div>');
            (f.options||[]).forEach(function(o,i){
                var txt = o.label + (f.has_price&&o.price?' (₹'+o.price+')':'');
                $sel.append('<option value="'+escH(o.value)+'">'+escH(txt)+'</option>');
                if ((o.nested_fields||[]).length) {
                    var $np = $('<div class="fb-nested-preview" id="pv'+f.id+'_'+i+'"></div>');
                    $np.append('<div class="fb-nested-preview-lbl"><i class="fas fa-sitemap"></i> Additional info required</div>');
                    o.nested_fields.forEach(function(nf){ $np.append(renderPvField(nf)); });
                    $nwrp.append($np);
                }
            });
            $sel.on('change', function(){
                var v=$(this).val();
                $nwrp.find('.fb-nested-preview').removeClass('show');
                (f.options||[]).forEach(function(o,i){ if(o.value===v&&(o.nested_fields||[]).length) $('#pv'+f.id+'_'+i).addClass('show'); });
            });
            $w.append($sel).append($nwrp);
        } else if (t==='radio'||t==='checkbox') {
            var $opts = $('<div class="fb-preview-opts"></div>');
            var $nwrp2 = $('<div></div>');
            (f.options||[]).forEach(function(o,i){
                var $opt = $('<label class="fb-preview-opt"></label>');
                var $inp = $('<input>').attr({type:t==='radio'?'radio':'checkbox',name:'pv_'+f.id}).val(o.value);
                $opt.append($inp).append('<span>'+escH(o.label)+'</span>');
                if (f.has_price&&o.price) $opt.append('<span class="opt-price-tag">₹'+o.price+'</span>');
                $opts.append($opt);
                if ((o.nested_fields||[]).length) {
                    var $np2 = $('<div class="fb-nested-preview" id="pv2'+f.id+'_'+i+'"></div>');
                    $np2.append('<div class="fb-nested-preview-lbl"><i class="fas fa-sitemap"></i> Additional details required</div>');
                    o.nested_fields.forEach(function(nf){ $np2.append(renderPvField(nf)); });
                    $nwrp2.append($np2);
                }
                $inp.on('change', function(){
                    if(t==='radio') { $nwrp2.find('.fb-nested-preview').removeClass('show'); }
                    if($(this).is(':checked')) $('#pv2'+f.id+'_'+i).addClass('show');
                    else $('#pv2'+f.id+'_'+i).removeClass('show');
                });
            });
            $w.append($opts).append($nwrp2);
        }
        if (f.help_text) $w.append('<div class="field-hint">'+escH(f.help_text)+'</div>');
        return $w;
    }

    // ---- JSON view ----
    function renderJson() {
        var json = JSON.stringify(formFields, null, 2);
        var hl = json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(m){
            var c='color:#f59e0b';
            if(/^"/.test(m)){ c=/:$/.test(m)?'color:#818cf8':'color:#34d399'; }
            else if(/true|false/.test(m)) c='color:#fb7185';
            else if(/null/.test(m)) c='color:#94a3b8';
            return '<span style="'+c+'">'+m+'</span>';
        });
        $('#fbJsonOut').html(hl);
    }

    // ---- Small helpers ----
    function makeSG(label, cls, val, ph, type) {
        var $g = $('<div class="fb-sg"></div>');
        $g.append('<label>'+label+'</label>');
        $g.append($('<input class="'+cls+'" type="'+(type||'text')+'" value="'+escH(val)+'" placeholder="'+escH(ph||'')+'">'));
        return $g;
    }

    function makeToggle(title, sub, cls, checked, green) {
        var $r = $('<div class="fb-toggle-row'+(green?' green':'')+'" ></div>');
        $r.append('<div class="fb-toggle-lbl"><div class="ttl">'+title+'</div><div class="sub">'+sub+'</div></div>');
        var $sw = $('<label class="fb-switch"></label>');
        $sw.append($('<input type="checkbox" class="'+cls+'"'+(checked?' checked':'')+'>')).append('<span class="fb-slider"></span>');
        $r.append($sw);
        return $r;
    }

})(django.jQuery);
</script>
{% endblock %}
